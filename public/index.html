<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkMinds Lab [v1.9]</title>
<style>
  :root{
    --bg:#eef2f7;
    --bg2:#ffffff;
    --bg-soft:#f7f9fc;
    --fg:#1a202c;
    --fg-dim:#4a5568;
    --fg-light:#718096;
    --accent:#3b82f6;
    --accent-light:#60a5fa;
    --accent-soft:#dbeafe;
    --accent-dark:#2563eb;
    --danger:#ef4444;
    --danger-soft:#fef2f2;
    --success:#22c55e;
    --success-soft:#f0fdf4;
    --warning:#f59e0b;
    --warning-soft:#fffbeb;
    --info:#06b6d4;
    --info-soft:#ecfeff;
    --muted:#94a3b8;
    --border:#e2e8f0;
    --border-light:#f1f5f9;
    --shadow-xs:0 1px 2px rgba(0,0,0,0.04);
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.05);
    --shadow-xl:0 20px 25px -5px rgba(0,0,0,0.1),0 8px 10px -6px rgba(0,0,0,0.06);
    --radius:14px;
    --radius-sm:10px;
    --radius-xs:6px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    --transition:all .2s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--fg);overflow:hidden}

  .scanline{display:none}
  .glow{text-shadow:none}

  /* screens */
  .screen{display:none;flex-direction:column;height:100vh;width:100vw;padding:20px}
  .screen.active{display:flex}

  /* card box */
  .term-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;position:relative;box-shadow:var(--shadow)}
  .term-box::before{content:attr(data-title);position:absolute;top:-10px;left:16px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;padding:3px 12px;font-size:10px;border-radius:6px;letter-spacing:.5px;font-weight:600;box-shadow:var(--shadow-xs)}

  /* login */
  #loginScreen{align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
  .login-wrap{max-width:400px;width:100%}
  .login-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:20px;box-shadow:var(--shadow-xl);padding:36px 32px;border:1px solid rgba(255,255,255,0.3)}
  .login-logo{text-align:center;margin-bottom:24px}
  .login-logo .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:var(--shadow-md);margin-bottom:12px}
  .login-logo h1{font-size:20px;font-weight:700;color:var(--fg);letter-spacing:-.5px}
  .login-logo p{font-size:12px;color:var(--fg-light);margin-top:4px}
  .prompt-line{margin:12px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .prompt{color:var(--accent-dark);white-space:nowrap;font-weight:600;font-size:13px}
  .prompt-line input{background:var(--bg-soft);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);font-family:var(--font);font-size:14px;padding:10px 14px;outline:none;flex:1;min-width:120px;transition:var(--transition)}
  .prompt-line input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3.5px rgba(59,130,246,0.12)}
  .prompt-line input::placeholder{color:var(--muted)}
  .login-btn{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;padding:11px 24px;cursor:pointer;margin-top:12px;transition:var(--transition);font-weight:600;width:100%;box-shadow:var(--shadow-md)}
  .login-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .login-btn:active{transform:translateY(0)}
  .error-msg{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
  .hint{color:var(--fg-light);font-size:11px;margin-top:14px;text-align:center}

  /* main header */
  .term-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow)}
  .brand{font-size:17px;font-weight:700;color:var(--fg);letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
  .brand::before{content:'';width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:inline-block;box-shadow:var(--shadow-xs)}
  .term-nav{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .nav-btn{background:var(--bg-soft);border:1px solid var(--border);color:var(--fg-dim);font-family:var(--font);font-size:12px;padding:6px 14px;cursor:pointer;transition:var(--transition);border-radius:8px;font-weight:500;white-space:nowrap}
  .nav-btn:hover{border-color:var(--accent-light);color:var(--accent);background:var(--accent-soft)}
  .nav-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-color:transparent;box-shadow:var(--shadow-xs)}
  .conn-status{font-size:11px;color:var(--danger);font-weight:600;display:flex;align-items:center;gap:4px}
  .conn-status.online{color:var(--success)}

  /* panels */
  .panel{display:none;flex:1;overflow-y:auto;gap:14px;flex-direction:column}
  .panel.active{display:flex}
  .panel-title{color:var(--fg-light);font-size:13px;margin-bottom:4px;font-weight:500;display:flex;align-items:center;gap:6px}
  .panel-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block}

  /* lab map layout */
  .lab-map{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:auto 32px auto;gap:12px}
  .lab-corridor{grid-column:1/-1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);letter-spacing:6px;box-shadow:var(--shadow-xs);font-weight:500}

  /* room card */
  .room-term{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);position:relative;padding:18px;box-shadow:var(--shadow);transition:var(--transition)}
  .room-term:hover{box-shadow:var(--shadow-md);border-color:var(--accent-light)}
  .room-term .rt-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border-light)}
  .room-term .rt-name{font-size:14px;font-weight:700;color:var(--fg)}
  .room-term .rt-chip{font-size:10px;color:var(--accent);background:var(--accent-soft);border:none;padding:3px 8px;border-radius:6px;font-weight:600}

  /* door marker */
  .room-door-marker{position:absolute;top:-9px;left:14px;background:linear-gradient(135deg,var(--warning),#d97706);color:#fff;font-size:10px;padding:3px 10px;z-index:2;letter-spacing:.5px;white-space:nowrap;border-radius:6px;border:none;font-weight:600;box-shadow:var(--shadow-xs)}

  .sensor-line{font-size:12px;padding:4px 0;display:flex;justify-content:space-between;gap:8px}
  .sensor-line .s-label{color:var(--fg-light);white-space:nowrap}
  .sensor-line .s-val{color:var(--fg);font-weight:600;text-align:right;white-space:nowrap}
  .sensor-line .s-val.warn{color:var(--warning)}
  .sensor-line .s-val.danger{color:var(--danger)}

  /* light control */
  .light-bar{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .light-tag{font-size:11px;padding:4px 10px;border:1px solid var(--border);color:var(--fg-light);border-radius:20px;background:var(--bg-soft);transition:var(--transition)}
  .light-tag.on{border-color:var(--success);color:var(--success);background:var(--success-soft);font-weight:600}
  .light-btn-term{background:var(--bg-soft);border:1px solid var(--border);color:var(--fg-dim);font-family:var(--font);font-size:11px;padding:5px 12px;cursor:pointer;transition:var(--transition);border-radius:8px;font-weight:500}
  .light-btn-term:hover{border-color:var(--accent-light);color:var(--accent);background:var(--accent-soft)}
  .light-btn-term.on{border-color:var(--success);color:var(--success);background:var(--success-soft);font-weight:600}
  .light-readonly{font-size:11px;padding:4px 10px;border:1px dashed var(--border);color:var(--muted);border-radius:20px;background:var(--bg-soft);font-style:italic;white-space:nowrap}

  /* tables */
  .term-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
  .term-table th,.term-table td{border:none;border-bottom:1px solid var(--border-light);padding:10px 14px;text-align:left}
  .term-table th{background:var(--bg-soft);color:var(--fg-dim);font-weight:600;white-space:nowrap;font-size:11px;letter-spacing:.3px}
  .term-table tr:last-child td{border-bottom:none}
  .term-table tr:hover td{background:var(--accent-soft)}
  .term-btn-sm{background:#fff;border:1px solid var(--border);color:var(--fg-dim);font-family:var(--font);font-size:11px;padding:5px 12px;cursor:pointer;margin-right:4px;border-radius:var(--radius-xs);transition:var(--transition);font-weight:500}
  .term-btn-sm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .term-btn-sm.danger{color:var(--danger);border-color:var(--border)}
  .term-btn-sm.danger:hover{background:var(--danger-soft);color:var(--danger);border-color:var(--danger)}
  .term-btn-sm.info{color:var(--info);border-color:var(--border)}
  .term-btn-sm.info:hover{background:var(--info-soft);color:var(--info);border-color:var(--info)}

  /* forms */
  .term-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:12px 0;padding:18px;background:var(--bg-soft);border-radius:var(--radius-sm);border:1px solid var(--border-light)}
  .term-form label{font-size:11px;color:var(--fg-light);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.3px}
  .term-form input,.term-form select{background:#fff;border:1.5px solid var(--border);color:var(--fg);font-family:var(--font);font-size:12px;padding:9px 12px;outline:none;width:100%;border-radius:var(--radius-xs);transition:var(--transition)}
  .term-form input:focus,.term-form select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}

  /* tabs */
  .term-tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid var(--border);padding-bottom:0}
  .term-tab{background:transparent;border:none;color:var(--fg-light);font-family:var(--font);font-size:13px;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition);font-weight:500}
  .term-tab:hover{color:var(--fg-dim)}
  .term-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

  /* scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  /* toast */
  .term-toast{position:fixed;bottom:24px;right:24px;background:var(--fg);color:#fff;border:none;padding:12px 22px;font-size:13px;transform:translateX(150%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:10000;border-radius:var(--radius-sm);box-shadow:var(--shadow-xl);font-weight:500}
  .term-toast.show{transform:translateX(0)}

  /* admin hide/show */
  .admin-only{display:none}
  body.is-admin .admin-only{display:inline-flex}
  body.is-admin .admin-only.block{display:block}
  body.is-admin .admin-only.flex{display:flex}

  /* responsive */
  @media(max-width:600px){
    .term-header{flex-direction:column;align-items:flex-start}
    .term-form{grid-template-columns:1fr}
    .lab-map{grid-template-columns:1fr}
  }

  /* Card stack view */
  .card-stack{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:14px}
  .inv-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow);position:relative}
  .inv-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--accent-light)}
  .inv-card .card-icon{font-size:28px;margin-bottom:10px}
  .inv-card .card-name{font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px}
  .inv-card .card-count{font-size:32px;font-weight:800;color:var(--accent);margin-bottom:10px;line-height:1}
  .inv-card .card-count span{font-size:12px;font-weight:400;color:var(--muted)}
  .inv-card .card-actions{display:flex;gap:6px;align-items:center}
  .inv-card .qty-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg-soft);color:var(--fg-dim);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
  .inv-card .qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.05)}
  .inv-card .qty-btn.minus:hover{background:var(--danger);border-color:var(--danger)}
  .inv-card .qty-display{font-size:14px;font-weight:600;color:var(--fg);min-width:38px;max-width:60px;text-align:center;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:5px 2px;outline:none;font-family:var(--font);transition:var(--transition)}
  .inv-card .qty-display:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
  .inv-card .card-detail-hint{font-size:10px;color:var(--muted);margin-top:8px}
  .inv-card .card-del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:6px;transition:var(--transition)}
  .inv-card .card-del-btn:hover{color:var(--danger);background:var(--danger-soft)}

  /* Expandable detail panel */
  .detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .3s;max-height:0;opacity:0;margin-bottom:0}
  .detail-panel.open{max-height:2000px;opacity:1;margin-bottom:14px}
  .detail-panel .detail-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg-soft);cursor:pointer;border-bottom:1px solid var(--border-light)}
  .detail-panel .detail-header h3{font-size:14px;color:var(--fg);font-weight:600;margin:0}
  .detail-panel .detail-close{background:none;border:none;color:var(--fg-light);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:var(--transition);line-height:1}
  .detail-panel .detail-close:hover{color:var(--danger);background:var(--danger-soft)}
  .detail-panel .detail-body{padding:0}
  .detail-panel .detail-body table{margin:0}

  /* Modal overlay */
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);z-index:9999;justify-content:center;align-items:center}
  .modal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:480px;width:90%;box-shadow:var(--shadow-xl)}
  .modal-title{font-size:17px;font-weight:700;color:var(--fg);margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .modal-title::before{content:'';width:4px;height:18px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:2px}
  .modal-field{margin-bottom:14px}
  .modal-field label{font-size:12px;color:var(--fg-light);display:block;margin-bottom:5px;font-weight:600}
  .modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--bg-soft);border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:9px 12px;color:var(--fg);font-size:14px;font-family:var(--font);outline:none;transition:var(--transition)}
  .modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
  .modal-field textarea{resize:vertical}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

  /* Request item card */
  .req-item{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;transition:var(--transition)}
  .req-item:hover{border-color:var(--accent-light);box-shadow:var(--shadow-xs)}

  /* Profile page */
  .profile-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
  .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
  .profile-avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--accent-soft),var(--accent));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:var(--shadow-md)}
  .profile-info h2{font-size:20px;font-weight:700;color:var(--fg);margin-bottom:4px}
  .profile-info .uid{font-size:13px;color:var(--accent);font-weight:600;background:var(--accent-soft);padding:3px 10px;border-radius:6px;display:inline-block}
  .profile-info .role{font-size:12px;color:var(--fg-light);margin-top:6px}
  .profile-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light)}
  .profile-row:last-child{border-bottom:none}
  .profile-row .label{color:var(--fg-light);font-size:13px;font-weight:500}
  .profile-row .value{color:var(--fg);font-size:14px;font-weight:600}
  .avatar-picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .avatar-option{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:var(--transition)}
  .avatar-option:hover{border-color:var(--accent-light);transform:scale(1.1)}
  .avatar-option.selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}

  /* Chat */
  .contact-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:var(--transition);border-left:3px solid transparent}
  .contact-item:hover{background:var(--accent-soft)}
  .contact-item.active{background:var(--accent-soft);border-left-color:var(--accent)}
  .contact-item .c-avatar{width:36px;height:36px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .contact-item .c-info{flex:1;min-width:0}
  .contact-item .c-name{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .contact-item .c-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .contact-item .c-badge{background:var(--danger);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;min-width:14px;text-align:center;flex-shrink:0}
  .chat-bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
  .chat-bubble.me{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  .chat-bubble.other{background:#fff;border:1px solid var(--border);color:var(--fg);border-bottom-left-radius:4px;align-self:flex-start}
  .chat-bubble.broadcast{background:var(--warning-soft);border:1px solid var(--warning);color:var(--fg);align-self:center;border-radius:10px;text-align:center;max-width:85%}
  .chat-time{font-size:10px;color:var(--muted);margin-top:2px}
  .friend-req-item{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border-light);font-size:12px}
  .friend-req-item .r-avatar{font-size:16px}
  .friend-req-item .r-name{flex:1;color:var(--fg);font-weight:500}
</style>
</head>
<body>
<div class="scanline"></div>

<!-- ========== LOGIN SCREEN ========== -->
<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">S</div>
        <h1>SparkMinds Lab</h1>
        <p>实验室物联网监控平台</p>
      </div>
      <div class="prompt-line"><span class="prompt">用户名</span><input type="text" id="loginUser" placeholder="admin / user" autocomplete="off"></div>
      <div class="prompt-line"><span class="prompt">密码</span><input type="password" id="loginPass" placeholder="********" autocomplete="off"></div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
(() => {
  // ===================== CONFIG =====================
  const BROKER = 'wss://broker.emqx.io:8084/mqtt';
  const TOPIC_IN = 'SparkMinds_Lab';
  const TOPIC_OUT = 'SparkMinds_Lab/Cmd';
  const CLIENT_ID = 'web_term_' + Math.random().toString(36).slice(2, 8);
  const LIGHT_OFF_THRESHOLD = 4000;

  const ROOMS = [
    { id: 'chuangzao', name: '创造课室', chip: 'ESP32C3', lights: 1 },
    { id: 'chuangxin', name: '创新课室', chip: 'ESP32C3', lights: 2 },
    { id: 'chuangzhi', name: '创智课室', chip: 'ESP32C3', lights: 1 },
    { id: 'chuangyi', name: '创意课室', chip: 'ESP32C3', lights: 1 },
    { id: 'xiuxi', name: '休息区', chip: 'ESP32C3', lights: 4 },
    { id: 'bangong', name: '办公区', chip: 'ESP32C3', lights: 1 },
    { id: '3d', name: '3D打印·操作·仓库区', chip: 'ESP32', lights: 1 },
  ];

  const AQI_LABELS = ['优', '良', '一般', '差', '很差', '严重污染'];
  const AQI_COLORS = ['#00ff41', '#88ff00', '#ffb000', '#ff8800', '#ff3333', '#ff00ff'];

  // ===================== STATE =====================
  let currentUser = null;
  let client = null;
  const lightState = {};
  const lightRawCache = {};
  const sensorCache = {};
  let editingMaterialId = null;
  let editingComponentId = null;
  let editingBoardId = null;

  // ===================== SIMULATION (替代服务端 MQTT 模拟器) =====================
  let simInterval = null;
  const SIM_ROOMS = ['chuangzao', 'chuangxin', 'chuangzhi', 'chuangyi', 'xiuxi', 'bangong', '3d'];
  function simRand(min, max) { return Math.random() * (max - min) + min; }
  function simRandInt(min, max) { return Math.floor(simRand(min, max + 1)); }

  function toggleSimulation() {
    if (simInterval) {
      clearInterval(simInterval);
      simInterval = null;
      const btn = $('#simBtn');
      btn.textContent = '模拟:关';
      btn.style.borderColor = 'var(--warning)';
      btn.style.color = 'var(--warning)';
      toast('模拟数据已关闭');
    } else {
      const btn = $('#simBtn');
      btn.textContent = '模拟:开';
      btn.style.borderColor = 'var(--success)';
      btn.style.color = 'var(--success)';
      toast('模拟数据已开启（无真实设备时用于测试）');
      simInterval = setInterval(() => {
        const room = SIM_ROOMS[Math.floor(Math.random() * SIM_ROOMS.length)];
        updateSensor(room, 'temp', simRand(22, 32).toFixed(1));
        updateSensor(room, 'humi', simRand(40, 75).toFixed(1));
        updateSensor(room, 'light', simRandInt(100, 4095));
        updateSensor(room, 'aqi', simRandInt(0, 3));
        updateSensor(room, 'tvoc', simRandInt(50, 800));
        updateSensor(room, 'eco2', simRandInt(420, 900));
      }, 4000);
    }
  }

  // ===================== STORAGE =====================
  // 用户数据存服务端（跨设备同步），库存数据仍存浏览器 localStorage
  const API = '/api';

  async function apiGetUsers(withPass = false) {
    try {
      const url = withPass ? `${API}/users?with_pass=1` : `${API}/users`;
      const r = await fetch(url);
      const j = await r.json();
      return j.ok ? j.users : [];
    } catch (e) { toast('无法连接服务器获取用户列表'); return []; }
  }

  async function apiLogin(name, pass) {
    try {
      const r = await fetch(`${API}/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pass })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiAddUser(name, pass, role) {
    try {
      const r = await fetch(`${API}/users`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pass, role })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiDeleteUser(name) {
    try {
      const r = await fetch(`${API}/users?name=${encodeURIComponent(name)}`, { method: 'DELETE' });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiUpdatePass(name, pass) {
    try {
      const r = await fetch(`${API}/users`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pass })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  // ===== 申请授权 API =====
  async function apiSubmitRequest(type, target, detail) {
    try {
      const r = await fetch(`${API}/requests`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: currentUser.name, type, target, detail })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiGetRequests() {
    try {
      const r = await fetch(`${API}/requests`);
      const j = await r.json();
      return j.ok ? j.requests : [];
    } catch (e) { return []; }
  }

  async function apiApproveRequest(id, note) {
    try {
      const r = await fetch(`${API}/requests/approve`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, reviewer: currentUser.name, note })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiDenyRequest(id, note) {
    try {
      const r = await fetch(`${API}/requests/deny`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, reviewer: currentUser.name, note })
      });
      return await r.json();
    } catch (e) { return { ok: false, msg: '无法连接服务器' }; }
  }

  async function apiPendingCount() {
    try {
      const r = await fetch(`${API}/requests/pending`);
      const j = await r.json();
      return j.ok ? j.count : 0;
    } catch (e) { return 0; }
  }

  function getMaterials() {
    const raw = localStorage.getItem('lab_materials');
    return raw ? JSON.parse(raw) : [];
  }
  function saveMaterials(m) { localStorage.setItem('lab_materials', JSON.stringify(m)); }

  function getComponents() {
    const raw = localStorage.getItem('lab_components');
    return raw ? JSON.parse(raw) : [];
  }
  function saveComponents(c) { localStorage.setItem('lab_components', JSON.stringify(c)); }

  function getBoards() {
    const raw = localStorage.getItem('lab_boards');
    return raw ? JSON.parse(raw) : [];
  }
  function saveBoards(b) { localStorage.setItem('lab_boards', JSON.stringify(b)); }

  // ===================== DOM UTILS =====================
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function fmtDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // ===================== LOGIN =====================
  function initLogin() {
    $('#loginBtn').addEventListener('click', doLogin);
    $('#loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    const sess = sessionStorage.getItem('lab_session');
    if (sess) {
      const u = JSON.parse(sess);
      currentUser = u;
      enterApp();
    }
  }

  async function doLogin() {
    const name = $('#loginUser').value.trim();
    const pass = $('#loginPass').value.trim();
    if (!name || !pass) { $('#loginError').textContent = '请输入用户名和密码'; return; }
    $('#loginError').textContent = '验证中...';
    const res = await apiLogin(name, pass);
    if (!res.ok) {
      $('#loginError').textContent = '登录失败: ' + (res.msg || '无效凭证');
      return;
    }
    currentUser = res.user;

  function buildLightBar(r) {
    const bar = $(`#lb-${r.id}`);
    bar.innerHTML = '';
    const count = r.lights;
    const isAdmin = currentUser.role === 'admin';
    for (let i = 1; i <= count; i++) {
      const tag = document.createElement('span');
      tag.className = 'light-tag off';
      tag.id = `tag-${r.id}${count===1?'':'-'+i}`;
      tag.textContent = count === 1 ? '灯光:关' : `灯${i}:关`;
      bar.appendChild(tag);

      if (isAdmin) {
        const btn = document.createElement('button');
        btn.className = 'light-btn-term';
        btn.dataset.room = r.id;
        if (count > 1) btn.dataset.light = i;
        btn.textContent = count === 1 ? '开关' : `灯${i}`;
        btn.addEventListener('click', () => sendLightCmd(r.id, count > 1 ? i : 1));
        bar.appendChild(btn);
      }
    }
    if (!isAdmin) {
      const ro = document.createElement('span');
      ro.className = 'light-readonly';
      ro.textContent = '🔒 只读';
      bar.appendChild(ro);
    }
  }

  function sendLightCmd(roomId, lightIdx) {
    if (currentUser.role !== 'admin') { const rm = ROOMS.find(r=>r.id===roomId); openRequestModal('light_control', rm ? rm.name : roomId); return; }
    const key = lightIdx === 1 && ROOMS.find(r=>r.id===roomId).lights===1 ? roomId : roomId+'_'+lightIdx;
    const isOn = !!lightState[key];
    const cmd = { room: roomId, light: lightIdx, cmd: isOn ? 'off' : 'on', user: currentUser.name, role: currentUser.role };
    if (client && client.connected) {
      client.publish(TOPIC_OUT, JSON.stringify(cmd));
    }
    toast(`${rm ? rm.name : roomId} 灯${lightIdx} -> ${isOn?'关':'开'}`);
    // optimistic toggle
    updateLightUI(roomId, lightIdx, !isOn);
  }

  function updateLightUI(roomId, lightIdx, isOn) {
    const r = ROOMS.find(x => x.id === roomId);
    if (!r) return;
    const count = r.lights;
    const tagId = count === 1 ? `tag-${roomId}` : `tag-${roomId}-${lightIdx}`;
    const tag = document.getElementById(tagId);
    if (tag) {
      tag.className = 'light-tag ' + (isOn ? 'on' : 'off');
      tag.textContent = count === 1 ? (isOn ? '灯光:开' : '灯光:关') : `灯${lightIdx}:${isOn?'开':'关'}`;
    }
    const key = count === 1 ? roomId : roomId + '_' + lightIdx;
    lightState[key] = isOn;
  }

  function updateSensor(roomId, key, value) {
    const roomEl = document.getElementById('room-' + roomId);
    if (!roomEl) return;
    const el = roomEl.querySelector(`[data-k="${key}"]`);
    if (!el) return;

    if (key === 'light') {
      const raw = parseInt(value);
      lightRawCache[roomId] = raw;
      const pct = Math.max(0, Math.min(100, Math.round((1 - raw / 4095) * 100)));
      el.textContent = pct + ' %';
      el.title = `raw ADC: ${raw}`;
      const isOn = raw <= LIGHT_OFF_THRESHOLD;
      const r = ROOMS.find(x => x.id === roomId);
      if (r) {
        for (let i = 1; i <= r.lights; i++) updateLightUI(roomId, i, isOn);
      }
      return;
    }

    if (key === 'aqi') {
      const v = parseInt(value);
      const label = AQI_LABELS[v] || '未知';
      const color = AQI_COLORS[v] || '#888';
      el.textContent = `${v} [${label}]`;
      el.style.color = color;
      return;
    }

    if (key === 'tvoc') {
      el.textContent = value + ' ppb';
      const v = parseInt(value);
      el.classList.toggle('warn', v >= 500 && v < 1500);
      el.classList.toggle('danger', v >= 1500);
      return;
    }

    if (key === 'eco2') {
      el.textContent = value + ' ppm';
      const v = parseInt(value);
      el.classList.toggle('warn', v >= 1000 && v < 2000);
      el.classList.toggle('danger', v >= 2000);
      return;
    }

    if (key === 'temp') {
      el.textContent = value + ' °C';
      const v = parseFloat(value);
      el.classList.toggle('warn', v >= 35 && v < 40);
      el.classList.toggle('danger', v >= 40);
      return;
    }

    if (key === 'humi') {
      el.textContent = value + ' %';
      const v = parseFloat(value);
      el.classList.toggle('warn', (v >= 80 && v < 90) || (v <= 20 && v > 10));
      el.classList.toggle('danger', v >= 90 || v <= 10);
      return;
    }

    el.textContent = value;
  }

  // ===================== MQTT =====================
  function initMQTT() {
    client = mqtt.connect(BROKER, { clientId: CLIENT_ID, clean: true, reconnectPeriod: 3000 });

    client.on('connect', () => {
      $('#connStatus').textContent = '● 在线';
      $('#connStatus').classList.add('online');
      client.subscribe(TOPIC_IN, { qos: 0 }, err => {
        if (!err) toast('MQTT 已订阅: ' + TOPIC_IN);
      });
    });

    client.on('message', (topic, payload) => {
      try {
        const d = JSON.parse(new TextDecoder().decode(payload));
        if (!d.room) return;
        const rid = d.room;
        if (d.temp != null) updateSensor(rid, 'temp', d.temp);
        if (d.humi != null) updateSensor(rid, 'humi', d.humi);
        if (d.light != null) updateSensor(rid, 'light', d.light);
        if (d.aqi != null) updateSensor(rid, 'aqi', d.aqi);
        if (d.tvoc != null) updateSensor(rid, 'tvoc', d.tvoc);
        if (d.eco2 != null) updateSensor(rid, 'eco2', d.eco2);
      } catch (e) {
        console.warn('mqtt parse error:', e);
      }
    });

    client.on('error', () => {
      $('#connStatus').textContent = '● ERROR';
      $('#connStatus').classList.remove('online');
    });
    client.on('close', () => {
      $('#connStatus').textContent = '● 离线';
      $('#connStatus').classList.remove('online');
    });
    client.on('reconnect', () => {
      $('#connStatus').textContent = '● RECONNECT...';
    });
  }

        let items = getMaterials();
        const currentItems = items.filter(x => x.type === type);
        const currentCount = currentItems.length;
        if (newCount > currentCount) {
          for (let i = 0; i < newCount - currentCount; i++) {
            items.push({ id: Date.now() + i, type, color: '新增', diameter: '1.75mm', weight: 1000, remain: 100, note: '批量修改', created: Date.now() });

        } else if (newCount < currentCount) {
          const toRemove = currentCount - newCount;
          const typeIds = currentItems.slice(-toRemove).map(x => x.id);

  // Boards card stack view — 数量融合：卡片显示 qty 总和，与详情表格联动
  function renderBoardCards() {
    const container = $('#boardCards');
    const items = getBoards();
    const groups = {};
    items.forEach(b => {
      if (!groups[b.type]) groups[b.type] = { count: 0, totalQty: 0, items: [] };
      groups[b.type].count++;
      groups[b.type].totalQty += (parseInt(b.qty) || 0);
      groups[b.type].items.push(b);
    });
    container.innerHTML = '';
    for (const type in groups) {
      const g = groups[type];
      const card = document.createElement('div');
      card.className = 'inv-card';
      card.innerHTML = `
        <button class="card-del-btn" data-type="${type}" title="删除该类型所有">&times;</button>
        <div class="card-name">${type}</div>
        <div class="card-count">${g.totalQty} <span>件</span></div>
        <div class="card-actions">
          <button class="qty-btn minus" data-type="${type}">-</button>
          <input type="number" class="qty-display" value="${g.totalQty}" min="0" data-type="${type}">
          <button class="qty-btn plus" data-type="${type}">+</button>
        </div>
        <div class="card-detail-hint">${g.count} 条记录 · 点击查看详情</div>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('.qty-btn') || e.target.closest('.card-del-btn')) return;
        openBoardDetail(type);
      });
      container.appendChild(card);
    }
    // +/- 与输入框均联动 qty 总和（与详情表格同一数量口径）
    container.querySelectorAll('.qty-btn.minus').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentUser.role !== 'admin') { openRequestModal('board_edit', btn.dataset.type); return; }
        const type = btn.dataset.type;
        let items = getBoards();
        const typeItems = items.filter(x => x.type === type);
        if (typeItems.length === 0) return;
        const lastItem = typeItems[typeItems.length - 1];
        const target = items.find(x => x.id === lastItem.id);
        target.qty = Math.max(0, (parseInt(target.qty) || 0) - 1);
        if (target.qty === 0 && typeItems.length > 1) items = items.filter(x => x.id !== target.id);
        saveBoards(items);
        renderBoardCards();
        if ($('#boardDetail').classList.contains('open') && $('#boardDetailTitle').textContent === type) {
          openBoardDetail(type);
        }
        toast(`${type} -1`);
      });
    });
    container.querySelectorAll('.qty-btn.plus').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentUser.role !== 'admin') { openRequestModal('board_edit', btn.dataset.type); return; }
        const type = btn.dataset.type;
        let items = getBoards();
        const typeItems = items.filter(x => x.type === type);
        if (typeItems.length > 0) {
          const target = items.find(x => x.id === typeItems[typeItems.length - 1].id);
          target.qty = (parseInt(target.qty) || 0) + 1;
        } else {
          items.push({ id: Date.now(), type, model: '新增', qty: 1, location: '-', status: '待测试', note: '快速添加', created: Date.now() });
        }
        saveBoards(items);
        renderBoardCards();
        if ($('#boardDetail').classList.contains('open') && $('#boardDetailTitle').textContent === type) {
          openBoardDetail(type);
        }
        toast(`${type} +1`);
      });
    });
    container.querySelectorAll('.card-del-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentUser.role !== 'admin') { openRequestModal('board_del', btn.dataset.type); return; }
        const type = btn.dataset.type;
        if (!confirm(`确定删除所有 ${type} 吗？`)) return;
        let items = getBoards();
        items = items.filter(x => x.type !== type);
        saveBoards(items);
        renderBoardCards();
        $('#boardDetail').classList.remove('open');
        toast(`已删除所有 ${type}`);
      });
    });
    container.querySelectorAll('.qty-display').forEach(inp => {
      inp.addEventListener('change', (e) => {
        e.stopPropagation();
        if (currentUser.role !== 'admin') { openRequestModal('board_edit', inp.dataset.type); return; }

        const newTotal = parseInt(inp.value) || 0;
        let items = getBoards();
        const typeItems = items.filter(x => x.type === type);
        const currentTotal = compSumQty(typeItems);
        if (typeItems.length === 0) {
          if (newTotal > 0) items.push({ id: Date.now(), type, model: '新增', qty: newTotal, location: '-', status: '待测试', note: '批量修改', created: Date.now() });
        } else {
          const diff = newTotal - currentTotal;
          if (diff !== 0) {
            const target = items.find(x => x.id === typeItems[typeItems.length - 1].id);
            target.qty = Math.max(0, (parseInt(target.qty) || 0) + diff);
            if (target.qty === 0 && typeItems.length > 1) items = items.filter(x => x.id !== target.id);
          }
        }
        saveBoards(items);
        renderBoardCards();
        if ($('#boardDetail').classList.contains('open') && $('#boardDetailTitle').textContent === type) {
          openBoardDetail(type);
        }
        toast(`${type} 总数调整为 ${newTotal}`);

  async function renderReqList(isAdmin) {
    const body = $('#reqListBody');
    const allReqs = await apiGetRequests();
    const reqs = isAdmin ? allReqs : allReqs.filter(r => r.user === currentUser.name);
    if (reqs.length === 0) {
      body.innerHTML = '<p style="color:var(--muted);text-align:center;padding:32px">暂无申请记录</p>';
      return;
    }
    body.innerHTML = reqs.reverse().map(r => {
      const statusColor = r.status === 'pending' ? 'var(--warning)' : r.status === 'approved' ? 'var(--success)' : 'var(--danger)';
      const statusText = r.status === 'pending' ? '待审批' : r.status === 'approved' ? '已批准' : '已拒绝';
      const adminActions = (isAdmin && r.status === 'pending')
        ? `<div style="display:flex;gap:8px;margin-top:10px">
             <button class="term-btn-sm" style="border-color:var(--success);color:var(--success)" onclick="approveReq(${r.id})">批准</button>
             <button class="term-btn-sm danger" onclick="denyReq(${r.id})">拒绝</button>
           </div>` : '';
      const reviewInfo = r.status !== 'pending'
        ? `<div style="font-size:12px;color:var(--fg-light);margin-top:6px">审批人: ${r.reviewedBy} | ${r.reviewedAt ? fmtDate(r.reviewedAt) : '-'}${r.adminNote ? ' | 备注: ' + r.adminNote : ''}</div>` : '';
      return `<div class="req-item">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:600;color:var(--accent)">${REQ_TYPE_LABELS[r.type] || r.type}</span>
          <span style="color:${statusColor};font-size:12px;font-weight:600">${statusText}</span>
        </div>
        <div style="font-size:13px;color:var(--fg)">目标: ${r.target || '-'} | 申请人: ${r.user}</div>
        <div style="font-size:13px;color:var(--fg-light);margin-top:4px">${r.detail}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">提交时间: ${fmtDate(r.created)}</div>
        ${reviewInfo}
        ${adminActions}
      </div>`;
    }).join('');
  }

  // ===================== 个人主页 =====================
  const AVATAR_LIST = ['😀','😎','🤓','🧑‍💻','👨‍🔬','👩‍🔬','🧑‍🔧','👷','👨‍💼','👩‍💼','🦊','🐱','🐧','🤖','🦉','🐯','🐨','🦁','🐸','🐙','🦄','🐲','🌟','⚡','🔥','🎯','🎨','🚀','💡','🧩'];
  let selectedAvatar = '';

  async function apiGetProfile(uid) {
    try { const r = await fetch(`/api/profile?uid=${uid}`); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiUpdateProfile(uid, nickname, avatar) {
    try { const r = await fetch('/api/profile', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ uid, nickname, avatar }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiGetFriends(uid) {
    try { const r = await fetch(`/api/friends?uid=${uid}`); return await r.json(); } catch(e) { return { ok:false, friends:[] }; }
  }
  async function apiFriendRequest(fromUid, toUid) {
    try { const r = await fetch('/api/friends/request', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ fromUid, toUid }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiAcceptFriend(reqId) {
    try { const r = await fetch('/api/friends/accept', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ reqId }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiRejectFriend(reqId) {
    try { const r = await fetch('/api/friends/reject', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ reqId }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiGetFriendReqs(uid) {
    try { const r = await fetch(`/api/friends/requests?uid=${uid}`); return await r.json(); } catch(e) { return { ok:false, requests:[] }; }
  }
  async function apiGetMessages(uid, peerUid) {
    try { const r = await fetch(`/api/messages?uid=${uid}&peerUid=${peerUid||''}`); return await r.json(); } catch(e) { return { ok:false, messages:[] }; }
  }
  async function apiSendMessage(from, to, content) {
    try { const r = await fetch('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ from, to, content }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiBroadcast(from, to, content) {
    try { const r = await fetch('/api/messages/broadcast', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ from, to, content }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }
  async function apiGetContacts(uid) {
    try { const r = await fetch(`/api/messages/contacts?uid=${uid}`); return await r.json(); } catch(e) { return { ok:false, contacts:[] }; }
  }
  async function apiGetUnread(uid) {
    try { const r = await fetch(`/api/messages/unread?uid=${uid}`); return await r.json(); } catch(e) { return { ok:false, count:0 }; }
  }
  async function apiRemoveFriend(uid, friendUid) {
    try { const r = await fetch('/api/friends/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ uid, friendUid }) }); return await r.json(); } catch(e) { return { ok:false }; }
  }

  function renderProfile() {
    if (!currentUser) return;
    const c = $('#profileContent');
    const isAdmin = currentUser.role === 'admin';
    selectedAvatar = currentUser.avatar || '😀';
    let avatarHtml = AVATAR_LIST.map(a => `<div class="avatar-option ${a===selectedAvatar?'selected':''}" data-avatar="${a}">${a}</div>`).join('');
    c.innerHTML = `<div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatarDisplay">${selectedAvatar}</div>
        <div class="profile-info">
          <h2 id="profileNicknameDisplay">${currentUser.nickname || currentUser.name}</h2>
          <span class="uid">UID: ${currentUser.uid}</span>
          <div class="role">角色: ${isAdmin ? '管理员' : '普通用户'} · 账号: ${currentUser.name}</div>
        </div>
      </div>
      <div class="profile-row"><span class="label">账号名</span><span class="value">${currentUser.name}</span></div>
      <div class="profile-row"><span class="label">UID</span><span class="value">${currentUser.uid}</span></div>
      <div class="profile-row"><span class="label">密码</span><span class="value">${currentUser.pass || '******'}</span></div>
      <div class="profile-row"><span class="label">角色</span><span class="value">${isAdmin ? '管理员' : '普通用户'}</span></div>
      <div class="profile-row"><span class="label">注册时间</span><span class="value">${fmtDate(currentUser.created)}</span></div>
      <div style="margin-top:24px">
        <div style="font-size:13px;font-weight:600;color:var(--fg);margin-bottom:10px">编辑昵称</div>
        <input type="text" id="profileNicknameInput" value="${currentUser.nickname || currentUser.name}" style="width:100%;background:var(--bg-soft);border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:10px 14px;font-size:14px;outline:none;margin-bottom:16px" placeholder="输入新昵称">
        <div style="font-size:13px;font-weight:600;color:var(--fg);margin-bottom:10px">选择头像</div>
        <div class="avatar-picker" id="avatarPicker">${avatarHtml}</div>
        <button class="nav-btn active" id="saveProfileBtn" style="margin-top:20px">保存修改</button>
      </div>
    </div>`;
    // 头像选择
    $('#avatarPicker').querySelectorAll('.avatar-option').forEach(el => {
      el.addEventListener('click', () => {
        $('#avatarPicker').querySelectorAll('.avatar-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.dataset.avatar;
        $('#profileAvatarDisplay').textContent = selectedAvatar;
      });
    });
    $('#saveProfileBtn').addEventListener('click', async () => {
      const nickname = $('#profileNicknameInput').value.trim();
      if (!nickname) { toast('昵称不能为空'); return; }
      const r = await apiUpdateProfile(currentUser.uid, nickname, selectedAvatar);
      if (r.ok) {
        currentUser.nickname = nickname;
        currentUser.avatar = selectedAvatar;
        toast('个人资料已更新');
        renderProfile();
      } else { toast(r.msg || '更新失败'); }
    });
  }

  // ===================== 站内信 =====================
  let currentChatPeer = null; // 当前聊天对象 UID
  let msgPollTimer = null;

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  async function updateMsgBadge() {
    if (!currentUser) return;
    const r = await apiGetUnread(currentUser.uid);
    const badge = $('#msgBadge');
    if (r.ok && r.count > 0) {
      badge.textContent = r.count > 99 ? '99+' : r.count;
      badge.style.display = 'inline-block';
    } else { badge.style.display = 'none'; }
  }

  async function renderContacts() {
    if (!currentUser) return;
    const r = await apiGetContacts(currentUser.uid);
    const list = $('#contactList');
    if (!r.ok || !r.contacts || r.contacts.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">暂无联系人<br>通过 UID 添加好友开始聊天</div>';
      return;
    }
    // 按最后消息时间排序
    r.contacts.sort((a,b) => (b.lastTime||0) - (a.lastTime||0));
    list.innerHTML = r.contacts.map(c => `
      <div class="contact-item ${currentChatPeer===c.uid?'active':''}" data-uid="${c.uid}" data-name="${c.nickname}" data-avatar="${c.avatar}">
        <div class="c-avatar">${c.avatar}</div>
        <div class="c-info">
          <div class="c-name">${c.nickname}${c.isAdmin?' <span style="color:var(--accent);font-size:10px">管理员</span>':''}</div>
          <div class="c-last">${c.lastMsg || '点击开始聊天'}</div>
        </div>
        ${c.unread ? `<span class="c-badge">${c.unread}</span>` : ''}
      </div>
    `).join('');
    list.querySelectorAll('.contact-item').forEach(el => {
      el.addEventListener('click', () => openChat(el.dataset.uid, el.dataset.name, el.dataset.avatar));
    });
  }

  async function renderFriendReqs() {
    if (!currentUser) return;
    const r = await apiGetFriendReqs(currentUser.uid);
    const el = $('#friendReqList');
    if (!r.ok || !r.requests || r.requests.length === 0) {
      el.innerHTML = ''; return;
    }
    el.innerHTML = '<div style="padding:6px 16px;font-size:11px;color:var(--fg-light);font-weight:600;background:var(--warning-soft)">好友请求</div>' +
      r.requests.map(req => `
        <div class="friend-req-item">
          <span class="r-avatar">${req.fromAvatar}</span>
          <span class="r-name">${req.fromName}</span>
          <button class="term-btn-sm" style="border-color:var(--success);color:var(--success);padding:3px 8px" data-accept="${req.id}">接受</button>
          <button class="term-btn-sm danger" style="padding:3px 8px" data-reject="${req.id}">拒绝</button>
        </div>
      `).join('');
    el.querySelectorAll('[data-accept]').forEach(b => {
      b.addEventListener('click', async () => {
        await apiAcceptFriend(parseInt(b.dataset.accept));
        toast('已添加好友');
        renderFriendReqs(); renderContacts();
      });
    });
    el.querySelectorAll('[data-reject]').forEach(b => {
      b.addEventListener('click', async () => {
        await apiRejectFriend(parseInt(b.dataset.reject));
        toast('已拒绝');
        renderFriendReqs();
      });
    });
  }

  async function openChat(peerUid, peerName, peerAvatar) {
    currentChatPeer = peerUid;
    $('#chatHeader').innerHTML = `${peerAvatar||'👤'} ${peerName||peerUid}`;
    $('#chatInput').disabled = false;
    $('#sendMsgBtn').disabled = false;
    $('#chatInput').focus();
    // 加载消息
    const r = await apiGetMessages(currentUser.uid, peerUid);
    renderChatMessages(r.messages || [], peerUid);
    // 刷新联系人列表高亮
    renderContacts();
    renderFriendReqs();
    // 启动消息轮询
    if (msgPollTimer) clearInterval(msgPollTimer);
    msgPollTimer = setInterval(async () => {
      if (currentChatPeer === peerUid) {
        const r2 = await apiGetMessages(currentUser.uid, peerUid);
        renderChatMessages(r2.messages || [], peerUid);
      }
    }, 5000);
  }

  function renderChatMessages(messages, peerUid) {
    const area = $('#chatMessages');
    if (messages.length === 0) {
      area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:40px 0">暂无消息，发送第一条吧</div>';
      return;
    }
    area.innerHTML = messages.map(m => {
      if (m.broadcast) {
        return `<div class="chat-bubble broadcast">📢 ${m.content}<div class="chat-time" style="text-align:center">${fmtTime(m.created)}</div></div>`;
      }
      const isMe = m.from === currentUser.uid;
      return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
        <div class="chat-bubble ${isMe?'me':'other'}">${m.content}</div>
        <div class="chat-time">${fmtTime(m.created)}</div>
      </div>`;
    }).join('');
    area.scrollTop = area.scrollHeight;
  }

  async function sendChatMessage() {
    const input = $('#chatInput');
    const content = input.value.trim();
    if (!content || !currentChatPeer) return;
    input.value = '';
    await apiSendMessage(currentUser.uid, currentChatPeer, content);
    const r = await apiGetMessages(currentUser.uid, currentChatPeer);
    renderChatMessages(r.messages || [], currentChatPeer);
    renderContacts();
  }

  function initMessaging() {
    $('#sendMsgBtn').addEventListener('click', sendChatMessage);
    $('#chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChatMessage(); });
    // 添加好友/搜索 UID
    $('#addFriendBtn').addEventListener('click', async () => {
      const uid = $('#addFriendInput').value.trim();
      if (!uid) { toast('请输入 UID'); return; }
      const r = await apiGetProfile(uid);
      if (!r.ok) { toast(r.msg || '用户不存在'); return; }
      // 显示搜索结果弹窗
      const isFriend = currentUser.friends && currentUser.friends.includes(uid);
      $('#searchUserResult').innerHTML = `
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-size:48px;margin-bottom:8px">${r.user.avatar}</div>
          <div style="font-size:16px;font-weight:700">${r.user.nickname}</div>
          <div style="font-size:12px;color:var(--accent);margin-top:4px">UID: ${r.user.uid}</div>
          <div style="font-size:12px;color:var(--fg-light);margin-top:2px">角色: ${r.user.role === 'admin' ? '管理员' : '普通用户'}</div>
        </div>
        ${isFriend ? '<div style="text-align:center;color:var(--success);font-size:13px">已经是好友</div>' :
          r.user.uid === currentUser.uid ? '<div style="text-align:center;color:var(--muted);font-size:13px">这是你自己</div>' :
          `<button class="nav-btn active" id="sendFriendReqBtn" style="width:100%;justify-content:center">发送好友请求</button>`}
      `;
      $('#searchUserModal').style.display = 'flex';
      const btn = $('#sendFriendReqBtn');
      if (btn) {
        btn.addEventListener('click', async () => {
          const rr = await apiFriendRequest(currentUser.uid, uid);
          if (rr.ok) {
            toast('好友请求已发送');
            $('#searchUserModal').style.display = 'none';
          } else { toast(rr.msg || '发送失败'); }
        });
      }
    });
    // 搜索弹窗关闭
    $('#searchUserClose').addEventListener('click', () => { $('#searchUserModal').style.display = 'none'; });
    // 广播按钮
    $('#broadcastBtn').addEventListener('click', async () => {
      // 加载用户列表填充下拉
      const r = await fetch('/api/users'); const data = await r.json();
      if (data.ok) {
        const sel = $('#broadcastTarget');
        sel.innerHTML = '<option value="all">全体用户</option>' +
          data.users.filter(u => u.uid !== currentUser.uid).map(u => `<option value="${u.uid}">${u.nickname} (${u.uid})</option>`).join('');
      }
      $('#broadcastContent').value = '';
      $('#broadcastModal').style.display = 'flex';
    });
    $('#broadcastCancel').addEventListener('click', () => { $('#broadcastModal').style.display = 'none'; });
    $('#broadcastSend').addEventListener('click', async () => {
      const target = $('#broadcastTarget').value;
      const content = $('#broadcastContent').value.trim();
      if (!content) { toast('消息内容不能为空'); return; }
      const r = await apiBroadcast(currentUser.uid, target, content);
      if (r.ok) {
        toast(`已发送给 ${r.count} 个目标`);
        $('#broadcastModal').style.display = 'none';
      } else { toast('发送失败'); }
    });
  }

  // ===================== INIT =====================
  initLogin();
})();
</script>
</body>
</html>
